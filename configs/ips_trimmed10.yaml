# Layer 2: Objective (동일)
objective:
  target_real_return:
    base: "KR_CPI"
    spread_low: 0.025
    spread_high: 0.040
  expected_volatility_band:
    low: 0.06
    high: 0.12
  max_drawdown_limit: -0.20

# Layer 3: Active risk (동일)
active_risk_budget:
  benchmark: "kr_60_40"
  benchmark_weights:
    kr-large-cap: 0.60
    kr-treasuries-10y: 0.40
  max_tracking_error: 0.06

# Constraints (동일 — 카테고리 cap이 trimmed에서도 그대로 유지됨)
constraints:
  position_limits:
    min: 0.0
    max: 0.25
  category_bounds:
    Equity:      {min: 0.20, max: 0.55}
    RealAssets:  {min: 0.00, max: 0.15}
    FixedIncome: {min: 0.20, max: 0.70}
    Cash:        {min: 0.00, max: 0.30}
  rebalancing:
    frequency: "quarterly"
    drift_trigger: 0.05

regulatory:
  account_type: "DC_IRP"
  risky_asset_limit: 0.70
  leverage_inverse_allowed: false
  default_locale: "ko_KR"

governance:
  human_role: "IPS author / 연금 운용자"
  autonomy_level: "L4"
  escalation_triggers:
    - "Any portfolio violating IPS bounds or 70% risky cap"
    - "Macro regime change with confidence > 0.8"
    - "USD/KRW > 1500 or < 1100 outside ±2σ band"
