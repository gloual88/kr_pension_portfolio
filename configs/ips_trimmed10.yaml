# Investment Policy Statement (IPS) — KR Pension, Trimmed 10-ETF Universe
#
# 18 → 10 ETFs (구독자 가독성 / 부담 경감 목적).
# Drop: kr-kosdaq, us-dividend, intl-developed, emerging-markets,
#       kr-short-bonds, kr-credit, us-treasuries-30y, commodities
# 카테고리 균형: Equity 4 (KR 2 + US 2), FI 3 (KR 1 + US 2), RealAsset 1 (Gold), Cash 2
#
# 모든 다른 설정(category bounds, benchmark, governance)은 ips.yaml과 동일.

investment_universe:
  description: "10 KR-listed ETFs (trimmed for subscriber-friendly portfolio)"
  asset_classes:
    # ---- KR Equity (2) ----
    - slug: kr-large-cap
      name: "KR Large Cap (KOSPI 200)"
      category: "Equity"
      etf: "069500"
      etf_name: "KODEX 200"
      currency_hedge: false
      history_start: "2002-10"
      macro_sensitivity: {growth: +1, rates: -1, inflation: 0, krw: +1}

    - slug: kr-dividend
