# Layer 2: Objective (KR pension investor, retirement focus)
objective:
  target_real_return:
    base: "KR_CPI"
    spread_low: 0.025    # KR CPI + 2.5%
    spread_high: 0.040   # KR CPI + 4.0%
  expected_volatility_band:
    low: 0.06
    high: 0.12
  max_drawdown_limit: -0.20

# Layer 3: Active risk
active_risk_budget:
  benchmark: "kr_60_40"   # KOSPI200 60% + KR T 10Y 40%
  benchmark_weights:
    kr-large-cap: 0.60
    kr-treasuries-10y: 0.40
  max_tracking_error: 0.06    # 6%

# Constraints — DC/IRP CIO mandate: 위험자산을 법적 한도 70%에 고정 운영.
# Equity 55% + RealAssets 15% = 위험자산 70% (locked).
# FixedIncome 25–30% + Cash 0–5% = 안전자산 30% (complement).
# 모델의 자유도는 카테고리 내부 비중 결정(어느 ETF에 얼마)과 FI duration/credit tilt에 한정.
constraints:
  position_limits:
    min: 0.0
    max: 0.25
  category_bounds:
    Equity:      {min: 0.55, max: 0.55}
    RealAssets:  {min: 0.15, max: 0.15}
    FixedIncome: {min: 0.25, max: 0.30}
    Cash:        {min: 0.00, max: 0.05}
  # 위험자산 70% lock: Equity 55 + RealAssets 15. 안전 30%: FI 25-30 + Cash 0-5.
  rebalancing:
    frequency: "quarterly"
    drift_trigger: 0.05

# Korean pension regulatory context
regulatory:
  account_type: "DC_IRP"          # Defined Contribution / Individual Retirement Pension
  risky_asset_limit: 0.70         # Equity + RealAssets + risky credit ≤ 70%
  leverage_inverse_allowed: false # 레버리지/인버스 ETF 매수 금지
  default_locale: "ko_KR"

# Governance
governance:
  human_role: "IPS author / 연금 운용자"
  autonomy_level: "L4"
  escalation_triggers:
    - "Any portfolio violating IPS bounds or 70% risky cap"
    - "Macro regime change with confidence > 0.8"
    - "USD/KRW > 1500 or < 1100 outside ±2σ band"
